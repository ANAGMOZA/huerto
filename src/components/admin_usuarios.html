<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HuertoHogar | Usuarios Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="admin-body">
<div class="admin-layout">
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <img src="../../src/assets/logo.jpg" alt="Logo" style="height:40px;border-radius:50%;margin-bottom:0.5rem;">
            <div class="logo-text" style="color:#fff;font-size:1.2rem;">HuertoHogar</div>
            <span class="badge-admin-pill">Administrador</span>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="admin_home.html">🏠 Inicio Admin</a></li>
                <li><a href="admin_productos.html">📦 Mantenedor Productos</a></li>
                <li><a href="admin_usuarios.html" class="active-sidebar">👥 Mantenedor Usuarios</a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a href="../../index.html" class="btn-back-store">⬅ Volver a la Tienda</a>
            <button id="btn-logout" onclick="cerrarSesion()" style="margin-top:0.8rem;width:100%;background:rgba(255,0,0,0.15);border:1px solid rgba(255,100,100,0.4);color:#ffaaaa;padding:0.6rem;border-radius:6px;cursor:pointer;font-size:0.85rem;font-weight:600;">🔒 Cerrar Sesión</button>
        </div>
    </aside>

    <main class="admin-content">
        <header class="admin-topbar">
            <h2>Gestión de Usuarios</h2>
            <span class="admin-user">👤 Admin HuertoHogar</span>
        </header>
        <div class="admin-panel">
            <div class="admin-card">
                <div class="admin-card-header"><h3>Registrar Nuevo Usuario</h3></div>
                <div class="admin-form">
                    <div id="admin-error-msg" class="error-box hidden"></div>
                    <div id="admin-success-msg" class="success-box hidden"></div>
                    <form id="admin-user-form" novalidate>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="admin-run">RUN</label>
                                <input type="text" id="admin-run" placeholder="Ej: 12345678K" required>
                                <small>Sin puntos ni guion</small>
                            </div>
                            <div class="form-group">
                                <label for="admin-rol">Tipo de Usuario</label>
                                <select id="admin-rol" required>
                                    <option value="">Selecciona un rol</option>
                                    <option value="Administrador">Administrador</option>
                                    <option value="Vendedor">Vendedor</option>
                                    <option value="Cliente">Cliente</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="admin-nombre">Nombre</label>
                                <input type="text" id="admin-nombre" placeholder="Nombre" maxlength="50" required>
                            </div>
                            <div class="form-group">
                                <label for="admin-apellidos">Apellidos</label>
                                <input type="text" id="admin-apellidos" placeholder="Apellidos" maxlength="100" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="admin-email">Correo Electrónico</label>
                                <input type="email" id="admin-email" placeholder="correo@ejemplo.com" maxlength="100" required>
                            </div>
                            <div class="form-group">
                                <label for="admin-fecha">Fecha Nacimiento <span style="color:#999;font-size:0.8rem;">(Opcional)</span></label>
                                <input type="date" id="admin-fecha">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="admin-direccion">Direccion</label>
                            <input type="text" id="admin-direccion" placeholder="Av. Ejemplo 1234, Santiago" maxlength="300" required>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn-primary">Guardar Usuario</button>
                            <button type="reset" class="btn-secondary">Limpiar</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="admin-card">
                <div class="admin-card-header"><h3>Usuarios Registrados</h3></div>
                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>RUN</th>
                                <th>Nombre</th>
                                <th>Apellidos</th>
                                <th>Rol</th>
                                <th>Correo</th>
                                <th>Dirección</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="admin-users-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="../js/main.js"></script>
</body>
</html>
